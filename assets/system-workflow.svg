<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1510" viewBox="0 0 1100 1510" role="img" aria-labelledby="title desc">
  <title id="title">End-to-end YOLOv5_FPC delivery flow</title>
  <desc id="desc">A professional vertical workflow diagram with red outline boxes and Japanese subtitles, showing how an ambiguous archive problem was structured into a big-data and AI development pipeline with public service impact.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#ef4444"/>
    </marker>
    <style>
      .title { font: 700 24px "Segoe UI", "Yu Gothic", Meiryo, Arial, sans-serif; fill: #111827; }
      .main { font: 700 22px "Segoe UI", "Yu Gothic", Meiryo, Arial, sans-serif; fill: #111827; }
      .sub { font: 500 18px "Segoe UI", "Yu Gothic", Meiryo, Arial, sans-serif; fill: #1f2937; }
      .jp { font: 500 18px "Yu Gothic", Meiryo, "Segoe UI", Arial, sans-serif; fill: #374151; }
      .note { font: 500 17px "Segoe UI", "Yu Gothic", Meiryo, Arial, sans-serif; fill: #4b5563; }
      .box { fill: #fffafa; stroke: #ef4444; stroke-width: 3; rx: 0; }
      .line { stroke: #ef4444; stroke-width: 3; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1100" height="1510" fill="#ffffff"/>

  <g transform="translate(64, 42)">
    <text class="title" x="0" y="0">End-to-End AI / Big Data Delivery Flow</text>
    <text class="note" x="0" y="44">From ambiguous industry problem structuring to a published dataset, reusable detector, and public archive service.</text>
    <text class="jp" x="0" y="78">産業課題の定義から、データセット公開・再利用可能な検出ツール・実サービス連携までを一貫して推進。</text>
    <line x1="0" y1="110" x2="972" y2="110" stroke="#d1d5db" stroke-width="1"/>
  </g>

  <g text-anchor="middle">
    <g transform="translate(280, 190)">
      <rect class="box" width="540" height="122"/>
      <text class="main" x="270" y="37">1. Ambiguous Problem Structuring</text>
      <text class="sub" x="270" y="69">Convert an archive challenge into an AI and big-data workflow</text>
      <text class="jp" x="270" y="99">（ビジネス・研究課題の定義）</text>
    </g>
    <line class="line" x1="550" y1="312" x2="550" y2="360"/>

    <g transform="translate(280, 370)">
      <rect class="box" width="540" height="122"/>
      <text class="main" x="270" y="37">2. Archive Source Collection</text>
      <text class="sub" x="270" y="69">Extract source metadata and collect 47,777 JPG files</text>
      <text class="jp" x="270" y="99">（新聞画像URL・メタデータ収集）</text>
    </g>
    <line class="line" x1="550" y1="492" x2="550" y2="540"/>

    <g transform="translate(280, 550)">
      <rect class="box" width="540" height="122"/>
      <text class="main" x="270" y="37">3. Training Data and Labeling</text>
      <text class="sub" x="270" y="69">Create FPC-specific labels for 4x1 and 2x2 layouts</text>
      <text class="jp" x="270" y="99">（学習データ作成・アノテーション）</text>
    </g>
    <line class="line" x1="550" y1="672" x2="550" y2="720"/>

    <g transform="translate(280, 730)">
      <rect class="box" width="540" height="122"/>
      <text class="main" x="270" y="37">4. YOLOv5_FPC Fine-Tuning</text>
      <text class="sub" x="270" y="69">Adapt a general object detector to archive-page FPC detection</text>
      <text class="jp" x="270" y="99">（ドメイン特化型物体検出モデル）</text>
    </g>
    <line class="line" x1="550" y1="852" x2="550" y2="900"/>

    <g transform="translate(280, 910)">
      <rect class="box" width="540" height="122"/>
      <text class="main" x="270" y="37">5. Evaluation</text>
      <text class="sub" x="270" y="69">F1-confidence 0.97 at threshold 0.708</text>
      <text class="jp" x="270" y="99">（精度評価・しきい値検証）</text>
    </g>
    <line class="line" x1="550" y1="1032" x2="550" y2="1080"/>

    <g transform="translate(280, 1090)">
      <rect class="box" width="540" height="122"/>
      <text class="main" x="270" y="37">6. Batch Detection and Curation</text>
      <text class="sub" x="270" y="69">Identify 1,040 FPC objects in 1,035 image files</text>
      <text class="jp" x="270" y="99">（大規模推論・検出結果DB化）</text>
    </g>
    <line class="line" x1="550" y1="1212" x2="550" y2="1260"/>

    <g transform="translate(280, 1270)">
      <rect class="box" width="540" height="122"/>
      <text class="main" x="270" y="37">7. Publication, Tool, and Service Impact</text>
      <text class="sub" x="270" y="69">First-author JOHD paper, Colab detector, public archive service</text>
      <text class="jp" x="270" y="99">（論文・再利用ツール・実サービス連携）</text>
    </g>
  </g>
</svg>
