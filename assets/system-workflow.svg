<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">YOLOv5_FPC end-to-end system workflow</title>
  <desc id="desc">A red box workflow showing archive collection, labeling, model fine-tuning, evaluation, batch detection, database curation, and public output.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7f1d1d"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#450a0a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1400" height="560" rx="28" fill="#fff7f7"/>
  <text x="60" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="800" fill="#7f1d1d">End-to-End YOLOv5_FPC Workflow</text>
  <text x="60" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#4b5563">From historical newspaper archives to a curated dataset, public detector script, publication, and service impact</text>

  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <g filter="url(#shadow)">
      <rect x="56" y="172" width="174" height="132" rx="18" fill="#b91c1c"/>
      <text x="143" y="216" font-size="20" font-weight="800" fill="#ffffff">Archive</text>
      <text x="143" y="247" font-size="17" fill="#fee2e2">47,777 JPG</text>
      <text x="143" y="274" font-size="17" fill="#fee2e2">images</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="286" y="172" width="174" height="132" rx="18" fill="#dc2626"/>
      <text x="373" y="216" font-size="20" font-weight="800" fill="#ffffff">Training Data</text>
      <text x="373" y="247" font-size="17" fill="#fee2e2">collect and</text>
      <text x="373" y="274" font-size="17" fill="#fee2e2">label FPCs</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="516" y="172" width="174" height="132" rx="18" fill="#b91c1c"/>
      <text x="603" y="216" font-size="20" font-weight="800" fill="#ffffff">Fine-Tune</text>
      <text x="603" y="247" font-size="17" fill="#fee2e2">YOLOv5_FPC</text>
      <text x="603" y="274" font-size="17" fill="#fee2e2">detector</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="746" y="172" width="174" height="132" rx="18" fill="#dc2626"/>
      <text x="833" y="216" font-size="20" font-weight="800" fill="#ffffff">Evaluate</text>
      <text x="833" y="247" font-size="17" fill="#fee2e2">F1 0.97</text>
      <text x="833" y="274" font-size="17" fill="#fee2e2">at 0.708</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="976" y="172" width="174" height="132" rx="18" fill="#b91c1c"/>
      <text x="1063" y="216" font-size="20" font-weight="800" fill="#ffffff">Batch Detect</text>
      <text x="1063" y="247" font-size="17" fill="#fee2e2">1,040 FPCs</text>
      <text x="1063" y="274" font-size="17" fill="#fee2e2">in 1,035 files</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="1206" y="172" width="174" height="132" rx="18" fill="#dc2626"/>
      <text x="1293" y="216" font-size="20" font-weight="800" fill="#ffffff">Curate</text>
      <text x="1293" y="247" font-size="17" fill="#fee2e2">URLs and</text>
      <text x="1293" y="274" font-size="17" fill="#fee2e2">metadata DB</text>
    </g>

    <line x1="238" y1="238" x2="278" y2="238" stroke="#7f1d1d" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="468" y1="238" x2="508" y2="238" stroke="#7f1d1d" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="698" y1="238" x2="738" y2="238" stroke="#7f1d1d" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="928" y1="238" x2="968" y2="238" stroke="#7f1d1d" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="1158" y1="238" x2="1198" y2="238" stroke="#7f1d1d" stroke-width="5" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="236" y="384" width="250" height="96" rx="18" fill="#991b1b"/>
      <text x="361" y="424" font-size="20" font-weight="800" fill="#ffffff">Public Detector</text>
      <text x="361" y="453" font-size="17" fill="#fee2e2">Google Colab script</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="576" y="384" width="250" height="96" rx="18" fill="#991b1b"/>
      <text x="701" y="424" font-size="20" font-weight="800" fill="#ffffff">Publication</text>
      <text x="701" y="453" font-size="17" fill="#fee2e2">First-author JOHD paper</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="916" y="384" width="250" height="96" rx="18" fill="#991b1b"/>
      <text x="1041" y="424" font-size="20" font-weight="800" fill="#ffffff">Service Impact</text>
      <text x="1041" y="453" font-size="17" fill="#fee2e2">Chosun public archive</text>
    </g>

    <path d="M1293 312 C1293 350, 1041 344, 1041 376" fill="none" stroke="#7f1d1d" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M1063 312 C1063 350, 701 344, 701 376" fill="none" stroke="#7f1d1d" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M833 312 C833 350, 361 344, 361 376" fill="none" stroke="#7f1d1d" stroke-width="5" marker-end="url(#arrow)"/>
  </g>
</svg>
